# =============================================================================
# Deploy to ECS via Vibe Platform
# =============================================================================
# URL: https://lynkuet-hackathon-team05.vibe.992872368362.cloud.bayer.com
# =============================================================================

name: Deploy Vibe Project

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  gate:
    name: Check deployment conditions
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
    steps:
      - name: Check conditions
        id: check
        run: |
          ACTOR="${{ github.actor }}"
          if [[ "$ACTOR" != "github-advanced-security"* ]] && { [[ "$ACTOR" == *"[bot]"* ]] || [[ "$ACTOR" == "dependabot"* ]]; }; then
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          else
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to ECS
    needs: gate
    if: needs.gate.outputs.should-deploy == 'true'
    uses: bayer-int/dd-platform-repository/.github/workflows/deploy-demo.yml@master
    with:
      project-name: ${{ github.event.repository.name }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: "arn:aws:iam::992872368362:role/vibe-platform-github-deploy"
      APP_OPENAI_KEY: ${{ secrets.APP_OPENAI_KEY }}
      APP_API_KEY: ${{ secrets.APP_API_KEY }}
      APP_SECRET_1: ${{ secrets.APP_SECRET_1 }}

  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [gate, deploy]
    if: always() && needs.gate.outputs.should-deploy == 'true'
    steps:
      - name: Write summary
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          {
            echo "## Deployment Summary"
            echo ""
            echo "**App URL:** [https://${REPO_NAME}.vibe.992872368362.cloud.bayer.com](https://${REPO_NAME}.vibe.992872368362.cloud.bayer.com)"
            echo ""
            [[ "$DEPLOY_RESULT" == "success" ]] && echo "**Status:** Success" || echo "**Status:** $DEPLOY_RESULT"
            echo ""
            echo "_Bayer network / VPN required._"
          } >> $GITHUB_STEP_SUMMARY
